<!doctype html>
<html><head><meta charset="utf-8"><style>
  * { box-sizing: border-box; margin: 0; }
  body { font-family: 'Segoe UI', sans-serif; }
  .stage { width: 360px; height: 640px; background: #0e1116; padding: 20px;
           position: relative; overflow: hidden; }
  .title { color: #eef0f2; font-size: 28px; font-weight: 700; }
  .sub { color: #8b93a1; font-size: 14px; margin-top: 6px; }

  /* gradient card -> rasterized IMAGE fill */
  .card { margin-top: 18px; height: 140px; border-radius: 16px; padding: 16px;
          background: linear-gradient(135deg, #1fae6a 0%, #0c6e44 100%);
          box-shadow: 0 8px 24px rgba(0,0,0,0.35); }
  .card .label { color: #d8ffe9; font-size: 13px; font-weight: 600; }
  .card .amount { color: #ffffff; font-size: 32px; font-weight: 700; margin-top: 10px; }

  /* clip-path cut-corner panel (GOGO KILL motif) -> rasterized IMAGE fill */
  .panel { margin-top: 18px; height: 64px; background: #1b1e26; padding: 14px;
           display: flex; align-items: center; gap: 12px;
           clip-path: polygon(0 0, calc(100% - 14px) 0, 100% 14px, 100% 100%, 14px 100%, 0 calc(100% - 14px)); }
  .panel .ptext { color: #c7f23a; font-size: 16px; font-weight: 600; }

  /* inline SVG icon -> rasterized whole */
  .icon { width: 28px; height: 28px; }

  .btn { margin-top: 18px; height: 52px; background: #3a7bff; border-radius: 26px;
         display: flex; align-items: center; justify-content: center; }
  .btn .t { color: #ffffff; font-size: 17px; font-weight: 600; }
</style></head>
<body>
  <div class="stage">
    <div class="title">Wallet</div>
    <div class="sub">Your balance overview</div>
    <div class="card">
      <div class="label">TOTAL BALANCE</div>
      <div class="amount">$9,531.70</div>
    </div>
    <div class="panel">
      <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="#c7f23a" stroke-width="2">
        <circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 3" stroke-linecap="round"/>
      </svg>
      <div class="ptext">Recent activity</div>
    </div>
    <div class="btn"><div class="t">Send</div></div>
  </div>
</body></html>
